<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — Current4Exams</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .article-page { max-width: 820px; margin: 32px auto; padding: 0 20px 60px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12.5px; color: var(--text-secondary); margin-bottom: 24px;
      cursor: pointer; transition: color 0.12s;
    }
    .back-btn:hover { color: var(--brand); }
    .back-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .article-header { margin-bottom: 24px; }
    .article-header .article-meta { margin-bottom: 12px; }
    .article-full-title {
      font-size: 22px; font-weight: 500; line-height: 1.4;
      color: var(--text-primary); margin-bottom: 14px;
    }
    .article-byline {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--text-muted);
      padding-bottom: 16px; border-bottom: 0.5px solid var(--border);
    }
    .article-body {
      font-size: 14.5px; line-height: 1.85; color: var(--text-primary);
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px 32px;
      margin-bottom: 24px;
    }
    .article-body p { margin-bottom: 14px; }
    .article-body h3 { font-size: 15px; font-weight: 500; margin: 20px 0 8px; }
    .article-body ul { padding-left: 20px; margin-bottom: 14px; }
    .article-body ul li { margin-bottom: 6px; }
    .article-body strong { font-weight: 500; }

    .exam-box {
      background: var(--brand-light); border: 0.5px solid var(--brand-mid);
      border-radius: var(--radius-md); padding: 16px 20px; margin-top: 20px;
    }
    .exam-box-title {
      font-size: 12px; font-weight: 500; color: var(--brand);
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .exam-box p { font-size: 13px; color: var(--brand-dark); line-height: 1.6; margin: 0; }

    .key-facts {
      background: #FAFAFA; border: 0.5px solid var(--border);
      border-radius: var(--radius-md); padding: 16px 20px; margin-top: 16px;
    }
    .key-facts-title { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .fact-item { display: flex; gap: 10px; padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .fact-item:last-child { border-bottom: none; }
    .fact-key { font-weight: 500; min-width: 140px; color: var(--text-secondary); flex-shrink: 0; }
    .fact-val { color: var(--text-primary); }
  </style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
    </div>
    Current4Exams
  </a>
  <nav class="nav-links">
    <a href="index.html" class="active">Current Affairs</a>
    <a href="#">Current Affairs Test</a>
    <a href="#">Study Notes</a>
  </nav>
  <div class="state-tabs">
    <button class="state-tab active">All</button>
    <button class="state-tab">UPPCS</button>
    <button class="state-tab">BPSC</button>
  </div>
</header>

<div class="article-page">
  <div class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Current Affairs
  </div>

  <div id="articleContent">
    <div class="empty-state">
      <div class="spinner"></div>
      Loading article...
    </div>
  </div>
</div>

<script type="module">
import { firebaseConfig } from './js/firebase-config.js';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const params = new URLSearchParams(location.search);
const id = params.get('id');
if (!id) { document.getElementById('articleContent').innerHTML = `<div class="empty-state">No article ID specified.</div>`; }
else loadArticle(id);

function tagClass(cat) {
  const map = {
    'current-affairs':'tag-ca','government-schemes':'tag-schemes','economy-banking':'tag-economy',
    'defence':'tag-defence','reports-indices':'tag-reports','environment':'tag-environment',
    'awards-honours':'tag-awards','places-in-news':'tag-places','important-days':'tag-days',
    'sports':'tag-sports','science-technology':'tag-science','summits-conferences':'tag-summits',
    'international':'tag-international','art-culture':'tag-culture',
    'up-schemes':'tag-up','up-infrastructure':'tag-up','bihar-schemes':'tag-bihar','bihar-infrastructure':'tag-bihar'
  };
  return map[cat] || 'tag-ca';
}
function catLabel(cat) {
  const map = {
    'current-affairs':'Current Affairs','government-schemes':'Govt. Schemes','economy-banking':'Economy',
    'defence':'Defence','reports-indices':'Reports','environment':'Environment','awards-honours':'Awards',
    'places-in-news':'Places','important-days':'Important Days','sports':'Sports',
    'science-technology':'Science & Tech','summits-conferences':'Summits','international':'International',
    'art-culture':'Art & Culture','up-schemes':'UP Schemes','up-infrastructure':'UP Infra',
    'bihar-schemes':'Bihar Schemes','bihar-infrastructure':'Bihar Infra'
  };
  return map[cat] || cat;
}
function impLabel(imp) {
  if (imp === 'high') return '<div class="imp-dot imp-high"></div><span class="imp-label">High importance</span>';
  if (imp === 'low')  return '<div class="imp-dot imp-low"></div><span class="imp-label">Low importance</span>';
  return '<div class="imp-dot imp-med"></div><span class="imp-label">Medium importance</span>';
}

async function loadArticle(id) {
  try {
    const snap = await getDoc(doc(db, 'articles', id));
    if (!snap.exists()) { document.getElementById('articleContent').innerHTML = `<div class="empty-state">Article not found.</div>`; return; }
    const a = { id: snap.id, ...snap.data() };
    document.title = (a.title || 'Article') + ' — Current4Exams';

    const date = a.publishedAt?.toDate
      ? a.publishedAt.toDate().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
      : '';

    const stateTag = (!a.states || a.states.includes('all'))
      ? '' : a.states.map(s => s === 'uppcs'
          ? `<span class="tag tag-up">UPPCS</span>`
          : `<span class="tag tag-bihar">BPSC</span>`).join('');

    const keyFacts = a.keyFacts && a.keyFacts.length
      ? `<div class="key-facts">
          <div class="key-facts-title">Key facts</div>
          ${a.keyFacts.map(f => `<div class="fact-item"><span class="fact-key">${f.key}</span><span class="fact-val">${f.value}</span></div>`).join('')}
        </div>` : '';

    const examNote = a.examNote
      ? `<div class="exam-box"><div class="exam-box-title">Exam relevance — ${a.relevance || 'Prelims + Mains'}</div><p>${a.examNote}</p></div>` : '';

    document.getElementById('articleContent').innerHTML = `
      <div class="article-header">
        <div class="article-meta">
          <span class="tag ${tagClass(a.category)}">${catLabel(a.category)}</span>
          ${stateTag}
        </div>
        <h1 class="article-full-title">${a.title || ''}</h1>
        <div class="article-byline">
          <span>${date}</span>
          ${a.source ? `<span>· Source: ${a.source}</span>` : ''}
          <div class="importance" style="margin-left:auto">${impLabel(a.importance)}</div>
        </div>
      </div>
      <div class="article-body">
        ${a.body || '<p>' + (a.summary || '') + '</p>'}
        ${keyFacts}
        ${examNote}
      </div>`;
  } catch(e) {
    document.getElementById('articleContent').innerHTML = `<div class="empty-state">Could not load article.</div>`;
  }
}
</script>
</body>
</html>
